<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    </head>

    <body style="margin: 0; overflow: hidden;">
         <div id="distance"></div>

         <a-scene
            embedded
            loading-screen="enabled: false;"
            arjs="sourceType: webcam; debugUIEnabled: false;"
        >
                <a-image
                    src="assets/test2.png"
                    look-at="[gps-camera]"
                    scale="5 5 1"
                    gps-entity-place="latitude:24.34030571096727; longitude:124.15823568896843;"
                ></a-image>

                <a-image
                    src="assets/test1.png"
                    look-at="[gps-camera]"
                    scale="5 5 1"
                    gps-entity-place="latitude:24.340575385500195; longitude:124.15827599413532;"
                ></a-image>

                
              <a-camera gps-camera="gpsMinDistance:10; minDistance:0; maxDistance:30" rotation-reader> </a-camera>
        </a-scene>

    </body>
</html>
