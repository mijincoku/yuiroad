<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    </head>

    <body style="margin: 0; overflow: hidden;">

         <a-scene
            embedded
            loading-screen="enabled: false;"
            arjs="sourceType: webcam; debugUIEnabled: false;"
        >

              <!-- a-image要素を作成 -->
      <script src="config.js"></script>
      <script>
        for (var i = 0; i < config.spot.length; i++) {
          var spot = config.spot[i];
          var image = document.createElement('a-image');
          image.setAttribute('src', spot.src);
          image.setAttribute('scale', spot.scale);
          image.setAttribute('gps-entity-place', `latitude: ${spot.latitude}; longitude: ${spot.longitude};`);
          document.querySelector('a-scene').appendChild(image);
        }
      </script>
                
            <a-camera gps-camera="gpsMinDistance:5; maxDistance:100;" rotation-reader> </a-camera>
        </a-scene>

    </body>
</html>
