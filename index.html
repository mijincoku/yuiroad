<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
        <style>
      body {
        font-family: sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      #distance {
        position: fixed;
        z-index: 10000;
        background-color: rgba(0,0,0,.8);
        color: #fff;
        text-align: center;
        padding: 10px;
        top: 10px;
        left: 5%;
        width: 90%;
        display: block;
      }
      body {
        margin: 0;
      }
      #message {
        position: fixed;
        z-index: 10;
        left: 5%;
        bottom: 30px;
        width: 90%;
        padding: 5%;
        color: #fff;
        font-weight: bold;
        background-color: rgba(0,0,0,.8);
        border-radius: 20px;
        border: 3px solid #fff;
        display: none;
      }
    </style>
    </head>

    <body style="margin: 0; overflow: hidden;">
         <div id="distance"></div>

         <a-scene
            embedded
            loading-screen="enabled: false;"
            arjs="sourceType: webcam; debugUIEnabled: false;"
        >
                <a-image
                    src="assets/test2.png"
                    look-at="[gps-camera]"
                    scale="5 5 1"
                    gps-entity-place="latitude:24.340283079823056; longitude:124.15835044561915;"
                ></a-image>

                <a-image
                    src="assets/test1.png"
                    look-at="[gps-camera]"
                    scale="5 5 1"
                    gps-entity-place="latitude:24.34052764226472; longitude:124.15832912730161;"
                ></a-image>

                
              <a-camera gps-camera="minDistance:0; maxDistance:20" rotation-reader> </a-camera>
        </a-scene>

    </body>
</html>
