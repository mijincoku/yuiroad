<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
        <style>
      body {
        font-family: sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      #distance {
        position: fixed;
        z-index: 10000;
        background-color: rgba(0,0,0,.8);
        color: #fff;
        text-align: center;
        padding: 10px;
        top: 10px;
        left: 5%;
        width: 90%;
        display: block;
      }
      body {
        margin: 0;
      }
      #message {
        position: fixed;
        z-index: 10;
        left: 5%;
        bottom: 30px;
        width: 90%;
        padding: 5%;
        color: #fff;
        font-weight: bold;
        background-color: rgba(0,0,0,.8);
        border-radius: 20px;
        border: 3px solid #fff;
        display: none;
      }
    </style>
    </head>

    <body style="margin: 0; overflow: hidden;">
         <div id="distance"></div>
         <a-scene
            embedded
            loading-screen="enabled: false;"
            arjs="sourceType: webcam; debugUIEnabled: false;"
        >
                <a-image
                    src="assets/busstop.png"
                    look-at="[gps-camera]"
                    scale="5 5 1"
                    gps-entity-place="latitude:24.34122511249459; longitude:124.15749094193984;"
                ></a-image>


                
            <a-camera gps-camera rotation-reader></a-camera>
        </a-scene>

        <script>
        window.addEventListener('load', function () {
        const el = document.querySelector('[gps-entity-place]');
        const distanceMsg = document.getElementById('distance');
        const message = document.getElementById('message');
        const directionLight = document.getElementById('directionLight');
        const ambientLight = document.getElementById('ambientLight');
        el.addEventListener('gps-entity-place-update-positon', (event) => {
          distanceMsg.textContent = `あと${event.detail.distance}m`;
          if(event.detail.distance <= 10) {
            // 10m以下で明るくする、メッセージ表示、距離非表示
            directionLight.setAttribute('intensity',1);
            ambientLight.setAttribute('intensity',1);
            distanceMsg.style.display = 'block';
            
          } else if(event.detail.distance <= 30) {
            // 30m以下で近づくほど明るくする、メッセージ非表示、距離表示
            directionLight.setAttribute('intensity',1 - event.detail.distance / 50);
            ambientLight.setAttribute('intensity',1 - event.detail.distance / 50);
            distanceMsg.style.display = 'block';

          } else {
            // 50mより離れると、明るさ0、メッセージ非表示、距離表示
            directionLight.setAttribute('intensity',0);
            ambientLight.setAttribute('intensity',0);
            distanceMsg.style.display = 'block';
          }
        });
        }); 
        </script>
    </body>
</html>
